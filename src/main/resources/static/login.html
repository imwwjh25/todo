<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoMaster - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==================== 设计系统变量 ==================== */
        :root {
            /* Light Mode */
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --background: #FFFFFF;
            --surface: #FFFFFF;
            --foreground: #1F2937;
            --muted: rgba(0, 0, 0, 0.6);
            --border: rgba(229, 231, 235, 0.8);
            --border-strong: #E5E7EB;
            --danger: #EF4444;

            /* 装饰色 */
            --deco-purple: rgb(108, 63, 245);
            --deco-black: rgb(45, 45, 45);
            --deco-orange: rgb(255, 155, 107);
            --deco-yellow: rgb(232, 215, 84);

            /* 尺寸 */
            --radius-full: 9999px;
            --radius-lg: 12px;
            --input-height: 48px;

            /* 字体 */
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

            /* 动画 */
            --transition: 0.3s ease;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --primary: #818CF8;
            --primary-hover: #A78BFA;
            --background: #111827;
            --surface: #1F2937;
            --foreground: #F9FAFB;
            --muted: rgba(255, 255, 255, 0.6);
            --border: rgba(75, 85, 99, 0.8);
            --border-strong: #4B5563;
        }

        /* ==================== 基础样式 ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            background: var(--background);
            color: var(--foreground);
        }

        /* ==================== 分屏布局 ==================== */
        .split-layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* ==================== 左侧品牌区 ==================== */
        .brand-side {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px;
            background: linear-gradient(to bottom right, #9CA3AF, #6B7280, #4B5563);
            color: white;
        }

        [data-theme="dark"] .brand-side {
            background: linear-gradient(to bottom right,
                rgba(255,255,255,0.9),
                rgba(255,255,255,0.8),
                rgba(255,255,255,0.7));
            color: #1F2937;
        }

        /* 网格装饰 */
        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        [data-theme="dark"] .grid-pattern {
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
        }

        /* 光晕装饰 */
        .glow-1 {
            position: absolute;
            top: 25%;
            right: 25%;
            width: 256px;
            height: 256px;
            background: rgba(156, 163, 175, 0.2);
            border-radius: 50%;
            filter: blur(64px);
            animation: pulse-glow 4s ease-in-out infinite;
        }

        .glow-2 {
            position: absolute;
            bottom: 25%;
            left: 25%;
            width: 384px;
            height: 384px;
            background: rgba(209, 213, 219, 0.2);
            border-radius: 50%;
            filter: blur(64px);
            animation: pulse-glow 5s ease-in-out infinite;
            animation-delay: 1s;
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.35;
                transform: scale(1.1);
            }
        }

        /* Logo区 */
        .brand-header {
            position: relative;
            z-index: 20;
        }

        .brand-logo-link {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
            color: inherit;
            text-decoration: none;
        }

        .brand-logo-icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            padding: 4px;
            border-radius: 8px;
        }

        [data-theme="dark"] .brand-logo-icon {
            background: rgba(99, 102, 241, 0.2);
        }

        /* 装饰图形区 */
        .deco-container {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 400px;
        }

        .deco-wrapper {
            position: relative;
            width: 550px;
            height: 400px;
        }

        /* 柱状图装饰 - CareerCompassAI风格 */
        .bar {
            position: absolute;
            bottom: 0;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center bottom;
        }

        /* 紫色柱 - 400px高，有眼睛 */
        .bar-1 {
            left: 70px;
            width: 180px;
            height: 400px;
            background: var(--deco-purple);
            border-radius: 10px 10px 0 0;
            z-index: 1;
        }

        /* 黑色柱 - 310px高，有眼睛 */
        .bar-2 {
            left: 240px;
            width: 120px;
            height: 310px;
            background: var(--deco-black);
            border-radius: 8px 8px 0 0;
            z-index: 2;
        }

        /* 橙色半圆 - 200px高，有眼睛 */
        .bar-3 {
            left: 0;
            width: 240px;
            height: 200px;
            background: var(--deco-orange);
            border-radius: 120px 120px 0 0;
            z-index: 3;
        }

        /* 黄色半圆 - 230px高，有眼睛+笑容 */
        .bar-4 {
            left: 310px;
            width: 140px;
            height: 230px;
            background: var(--deco-yellow);
            border-radius: 70px 70px 0 0;
            z-index: 4;
        }

        /* 眼睛容器 */
        .eyes-container {
            position: absolute;
            display: flex;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 紫色柱眼睛容器 - 有眼白 */
        .bar-1 .eyes-container {
            left: 60px;
            top: 32px;
            gap: 32px;
        }

        /* 黑色柱眼睛容器 - 有眼白 */
        .bar-2 .eyes-container {
            left: 41px;
            top: 22px;
            gap: 24px;
        }

        /* 橙色柱眼睛容器 - 无眼白 */
        .bar-3 .eyes-container {
            left: 97px;
            top: 80px;
            gap: 32px;
        }

        /* 黄色柱眼睛容器 - 无眼白 */
        .bar-4 .eyes-container {
            left: 67px;
            top: 30px;
            gap: 24px;
        }

        /* 眼白容器 */
        .eye-white {
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.15s ease-out;
        }

        .bar-1 .eye-white {
            width: 18px;
            height: 18px;
        }

        .bar-2 .eye-white {
            width: 16px;
            height: 16px;
        }

        /* 瞳孔 */
        .pupil {
            border-radius: 50%;
            background: var(--deco-black);
            transition: transform 0.1s ease-out;
        }

        .bar-1 .pupil {
            width: 7px;
            height: 7px;
        }

        .bar-2 .pupil {
            width: 6px;
            height: 6px;
        }

        /* 无眼白的眼睛（橙色和黄色柱） */
        .bar-3 .pupil,
        .bar-4 .pupil {
            width: 12px;
            height: 12px;
        }

        /* 笑容线 */
        .smile-line {
            position: absolute;
            width: 80px;
            height: 4px;
            background: var(--deco-black);
            border-radius: 9999px;
            left: 55px;
            top: 78px;
            transition: all 0.2s ease-out;
        }

        /* 横线装饰（替代眼睛）- CareerCompassAI实际是眼睛 */
        .lines {
            position: absolute;
            display: flex;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-1 .lines {
            left: 60px;
            top: 32px;
            gap: 32px;
        }

        .bar-2 .lines {
            left: 41px;
            top: 22px;
            gap: 24px;
        }

        .line {
            border-radius: 9999px;
            background: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bar-1 .line {
            width: 18px;
            height: 18px;
        }

        .bar-2 .line {
            width: 16px;
            height: 16px;
        }

        /* 线条内的瞳孔 */
        .line .pupil {
            border-radius: 50%;
            background: var(--deco-black);
            transition: transform 0.1s ease-out;
        }

        .bar-1 .line .pupil {
            width: 7px;
            height: 7px;
        }

        .bar-2 .line .pupil {
            width: 6px;
            height: 6px;
        }

        /* 底部链接 */
        .brand-footer {
            position: relative;
            z-index: 20;
            display: flex;
            gap: 32px;
            font-size: 14px;
            color: rgba(0,0,0,0.5);
        }

        [data-theme="dark"] .brand-footer {
            color: rgba(31, 41, 55, 0.7);
        }

        .brand-footer a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .brand-footer a:hover {
            color: inherit;
            text-decoration: underline;
        }

        /* ==================== 右侧表单区 ==================== */
        .form-side {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            background: var(--background);
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        /* 移动端Logo */
        .mobile-logo {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 48px;
        }

        /* 标题区 */
        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 14px;
            color: var(--muted);
        }

        /* ==================== 表单样式 ==================== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: var(--input-height);
            padding: 0 16px;
            font-size: 16px;
            font-family: var(--font-main);
            background: var(--surface);
            color: var(--foreground);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        /* 密码框容器 */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--foreground);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        /* 功能链接行 */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-checkbox {
            width: 16px;
            height: 16px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .forgot-link {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
            transition: text-decoration 0.2s;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* ==================== 按钮样式 ==================== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-pill {
            position: relative;
            width: 100%;
            height: var(--input-height);
            border-radius: var(--radius-full);
            font-size: 16px;
            font-weight: 500;
            font-family: var(--font-main);
            cursor: pointer;
            overflow: hidden;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--foreground);
            transition: border-color 0.2s;
        }

        .btn-pill:hover {
            border-color: var(--primary);
        }

        /* 按钮文字动画 */
        .btn-text {
            position: relative;
            z-index: 1;
            display: block;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .btn-pill:hover .btn-text {
            transform: translateX(40px);
            opacity: 0;
        }

        /* 按钮hover背景 */
        .btn-hover-bg {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: var(--radius-full);
        }

        .btn-pill:hover .btn-hover-bg {
            opacity: 1;
        }

        .btn-hover-bg svg {
            width: 18px;
            height: 18px;
        }

        .btn-primary {
            border-color: var(--border);
        }

        .btn-google {
            border-color: var(--border);
        }

        .btn-google .btn-hover-bg svg {
            width: 20px;
            height: 20px;
        }

        /* ==================== 底部注册链接 ==================== */
        .form-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--muted);
        }

        .signup-link {
            color: var(--foreground);
            font-weight: 500;
            text-decoration: none;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        /* ==================== 错误提示 ==================== */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* ==================== 主题切换按钮 ==================== */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
            z-index: 100;
        }

        .theme-toggle:hover {
            opacity: 0.8;
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            color: var(--foreground);
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 1024px) {
            .split-layout {
                grid-template-columns: 1fr;
            }

            .brand-side {
                display: none;
            }

            .mobile-logo {
                display: flex;
            }

            .form-side {
                padding: 24px;
            }

            .theme-toggle {
                top: 16px;
                right: 16px;
            }
        }

        @media (max-width: 480px) {
            .form-side {
                padding: 16px;
            }

            .form-container {
                max-width: 100%;
            }

            .form-title {
                font-size: 24px;
            }
        }

        /* ==================== Reduced Motion ==================== */
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="theme-icon-moon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
    </button>

    <!-- Split Layout -->
    <div class="split-layout">
        <!-- Left Brand Side -->
        <div class="brand-side">
            <!-- Logo -->
            <div class="brand-header">
                <a href="/" class="brand-logo-link">
                    <svg class="brand-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                        <path d="M9 5a2 2 0 002 2h2a2 2 0 002-2"/>
                        <path d="M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        <path d="M9 14l2 2 4-4"/>
                    </svg>
                    <span>TodoMaster</span>
                </a>
            </div>

            <!-- Decorative Graphics -->
            <div class="deco-container">
                <div class="deco-wrapper">
                    <!-- Purple Bar with Eyes -->
                    <div class="bar bar-1" id="bar-1">
                        <div class="lines" id="eyes-1">
                            <div class="line"><div class="pupil" id="pupil-1"></div></div>
                            <div class="line"><div class="pupil" id="pupil-2"></div></div>
                        </div>
                    </div>
                    <!-- Black Bar with Eyes -->
                    <div class="bar bar-2" id="bar-2">
                        <div class="lines" id="eyes-2">
                            <div class="line"><div class="pupil" id="pupil-3"></div></div>
                            <div class="line"><div class="pupil" id="pupil-4"></div></div>
                        </div>
                    </div>
                    <!-- Orange Semi-circle with Eyes -->
                    <div class="bar bar-3" id="bar-3">
                        <div class="eyes-container" id="eyes-3">
                            <div class="pupil" id="pupil-5"></div>
                            <div class="pupil" id="pupil-6"></div>
                        </div>
                    </div>
                    <!-- Yellow Semi-circle with Eyes + Smile -->
                    <div class="bar bar-4" id="bar-4">
                        <div class="eyes-container" id="eyes-4">
                            <div class="pupil" id="pupil-7"></div>
                            <div class="pupil" id="pupil-8"></div>
                        </div>
                        <div class="smile-line" id="smile-line"></div>
                    </div>
                </div>
            </div>

            <!-- Footer Links -->
            <div class="brand-footer">
                <a href="#">隐私政策</a>
                <a href="#">服务条款</a>
            </div>

            <!-- Decorative Elements -->
            <div class="grid-pattern"></div>
            <div class="glow-1"></div>
            <div class="glow-2"></div>
        </div>

        <!-- Right Form Side -->
        <div class="form-side">
            <div class="form-container">
                <!-- Mobile Logo -->
                <div class="mobile-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                        <path d="M9 5a2 2 0 002 2h2a2 2 0 002-2"/>
                        <path d="M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        <path d="M9 14l2 2 4-4"/>
                    </svg>
                    <span>TodoMaster</span>
                </div>

                <!-- Header -->
                <div class="form-header">
                    <h1 class="form-title">欢迎回来！</h1>
                    <p class="form-subtitle">请输入您的登录信息</p>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="error-message" role="alert"></div>

                <!-- Form -->
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" id="username" name="username" class="form-input"
                               placeholder="请输入用户名" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">密码</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" class="form-input"
                                   placeholder="请输入密码" required autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="显示密码">
                                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg id="eye-off-icon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10.77 6.27a4.5 4.5 0 1 1 6.47 6.47"/>
                                    <path d="M17.77 17.77a10.75 10.75 0 0 1-15.06-15.06"/>
                                    <path d="M2 2l20 20"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" class="remember-checkbox">
                            <span>记住登录 30 天</span>
                        </label>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn-pill btn-primary">
                            <span class="btn-text">登录</span>
                            <div class="btn-hover-bg">
                                <span>登录</span>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M5 12h14"/>
                                    <path d="m12 5 7 7-7 7"/>
                                </svg>
                            </div>
                        </button>

                        <button type="button" class="btn-pill btn-google" onclick="handleGoogleLogin()">
                            <span class="btn-text">使用 Google 登录</span>
                            <div class="btn-hover-bg">
                                <span>使用 Google 登录</span>
                                <svg viewBox="0 0 488 512" fill="currentColor">
                                    <path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 126 23.4 172.9 61.9l-76.2 76.2C322.3 113.2 289.4 96 248 96c-88.8 0-160.1 71.9-160.1 160.1s71.3 160.1 160.1 160.1c98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 26.9 3.9 41.4z"/>
                                </svg>
                            </div>
                        </button>
                    </div>
                </form>

                <!-- Footer -->
                <div class="form-footer">
                    还没有账户？<a href="#" class="signup-link">联系管理员</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeIcon(theme);
        }

        // 更新主题图标
        function updateThemeIcon(theme) {
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');
            if (theme === 'dark') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        // 切换主题
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        // 切换密码显示
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                passwordInput.type = 'password';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        }

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');

            if (!username || !password) {
                errorEl.textContent = '请输入用户名和密码';
                errorEl.classList.add('show');
                return;
            }

            errorEl.classList.remove('show');

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.code === 200) {
                    localStorage.setItem('auth_token', data.data.token);
                    localStorage.setItem('user_nickname', data.data.nickname);
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = data.message || '登录失败，请重试';
                    errorEl.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorEl.textContent = '网络错误，请检查网络连接后重试';
                errorEl.classList.add('show');
            }
        }

        // Google登录（占位）
        function handleGoogleLogin() {
            alert('Google 登录功能暂未开放');
        }

        // ==================== CareerCompassAI风格动态效果 ====================
        function initAnimation() {
            const decoWrapper = document.querySelector('.deco-wrapper');
            if (!decoWrapper) return;

            // 柱状图元素
            const bars = [
                {
                    element: document.getElementById('bar-1'),
                    eyesContainer: document.getElementById('eyes-1'),
                    pupils: [document.getElementById('pupil-1'), document.getElementById('pupil-2')],
                    eyeWhiteSize: 18,
                    pupilSize: 7,
                    eyeBaseLeft: 60,
                    eyeBaseTop: 32,
                    maxSkew: 6,
                    skewMultiplier: 1.0
                },
                {
                    element: document.getElementById('bar-2'),
                    eyesContainer: document.getElementById('eyes-2'),
                    pupils: [document.getElementById('pupil-3'), document.getElementById('pupil-4')],
                    eyeWhiteSize: 16,
                    pupilSize: 6,
                    eyeBaseLeft: 41,
                    eyeBaseTop: 22,
                    maxSkew: 6,
                    skewMultiplier: 1.2
                },
                {
                    element: document.getElementById('bar-3'),
                    eyesContainer: document.getElementById('eyes-3'),
                    pupils: [document.getElementById('pupil-5'), document.getElementById('pupil-6')],
                    eyeWhiteSize: 12,  // 无眼白，直接是瞳孔
                    pupilSize: 12,
                    eyeBaseLeft: 97,
                    eyeBaseTop: 80,
                    maxSkew: 6,
                    skewMultiplier: 0.8
                },
                {
                    element: document.getElementById('bar-4'),
                    eyesContainer: document.getElementById('eyes-4'),
                    pupils: [document.getElementById('pupil-7'), document.getElementById('pupil-8')],
                    eyeWhiteSize: 12,
                    pupilSize: 12,
                    eyeBaseLeft: 67,
                    eyeBaseTop: 30,
                    maxSkew: 6,
                    skewMultiplier: 0.9,
                    smileLine: document.getElementById('smile-line'),
                    smileBaseLeft: 55
                }
            ];

            // 容器尺寸
            const CONTAINER_WIDTH = 550;
            const CONTAINER_HEIGHT = 400;

            // 密码字段引用
            const passwordInput = document.getElementById('password');

            document.addEventListener('mousemove', (e) => {
                const rect = decoWrapper.getBoundingClientRect();
                const centerX = rect.left + CONTAINER_WIDTH / 2;
                const centerY = rect.top + CONTAINER_HEIGHT / 2;

                // 计算鼠标相对于中心的偏移
                const deltaX = e.clientX - centerX;
                const deltaY = e.clientY - centerY;

                // 归一化到 -1 到 1 范围
                const normalizedX = Math.max(-1, Math.min(1, deltaX / (CONTAINER_WIDTH / 2)));
                const normalizedY = Math.max(-1, Math.min(1, deltaY / (CONTAINER_HEIGHT / 2)));

                // 判断密码输入框是否聚焦
                const isPasswordFocused = document.activeElement === passwordInput;

                // 决定是否闭眼：仅在密码框聚焦时
                const shouldCloseEyes = isPasswordFocused;

                bars.forEach((bar, index) => {
                    if (!bar.element) return;

                    // 1. 计算柱状图倾斜
                    const skew = normalizedX * bar.maxSkew * bar.skewMultiplier;
                    bar.element.style.transform = `skewX(${skew}deg)`;

                    // 2. 计算眼睛容器位置（黄色柱不移动，保持原位）
                    if (bar.eyesContainer && index !== 3) {
                        // 水平偏移：鼠标在左时眼睛向左移动
                        const eyeOffsetX = normalizedX * 25;
                        // 垂直偏移：鼠标在上时眼睛向上移动
                        const eyeOffsetY = normalizedY * 10;

                        const newLeft = bar.eyeBaseLeft + eyeOffsetX;
                        const newTop = bar.eyeBaseTop + eyeOffsetY;
                        bar.eyesContainer.style.left = `${newLeft}px`;
                        bar.eyesContainer.style.top = `${newTop}px`;
                    }

                    // 3. 眼睛闭合动画（仅紫色柱和黑色柱有眼白）
                    if (bar.eyesContainer && index < 2) {
                        const eyeWhites = bar.eyesContainer.querySelectorAll('.line');
                        eyeWhites.forEach(eyeWhite => {
                            if (shouldCloseEyes) {
                                // 闭眼：高度变为2px，隐藏瞳孔
                                eyeWhite.style.height = '2px';
                                eyeWhite.style.width = '18px';
                                const pupil = eyeWhite.querySelector('.pupil');
                                if (pupil) pupil.style.opacity = '0';
                            } else {
                                // 睁眼：恢复正常
                                eyeWhite.style.height = index === 0 ? '18px' : '16px';
                                eyeWhite.style.width = index === 0 ? '18px' : '16px';
                                const pupil = eyeWhite.querySelector('.pupil');
                                if (pupil) pupil.style.opacity = '1';
                            }
                        });
                    }

                    // 4. 计算瞳孔位移
                    if (bar.pupils && !shouldCloseEyes) {
                        // 最大位移 = (眼白半径 - 瞳孔半径) - 0.5px边界
                        const maxPupilMove = (bar.eyeWhiteSize / 2) - (bar.pupilSize / 2) - 0.5;

                        bar.pupils.forEach((pupil, i) => {
                            if (!pupil) return;
                            // 瞳孔跟随鼠标
                            const pupilX = normalizedX * maxPupilMove;
                            const pupilY = normalizedY * maxPupilMove;

                            // 添加微小随机差异，使两只眼睛不完全同步
                            const randomOffset = (Math.random() - 0.5) * 0.3;
                            pupil.style.transform = `translate(${pupilX + randomOffset}px, ${pupilY + randomOffset}px)`;
                        });
                    }

                    // 5. 笑容线位置保持不变（黄色柱）
                    // 已移除笑容线位移动画
                });
            });

            // 密码框聚焦时闭眼
            function setEyesClosed(closed) {
                bars.forEach((bar, index) => {
                    if (bar.eyesContainer && index < 2) {
                        const eyeWhites = bar.eyesContainer.querySelectorAll('.line');
                        eyeWhites.forEach(eyeWhite => {
                            if (closed) {
                                eyeWhite.style.height = '2px';
                                eyeWhite.style.width = index === 0 ? '18px' : '16px';
                                const pupil = eyeWhite.querySelector('.pupil');
                                if (pupil) pupil.style.opacity = '0';
                            } else {
                                eyeWhite.style.height = index === 0 ? '18px' : '16px';
                                eyeWhite.style.width = index === 0 ? '18px' : '16px';
                                const pupil = eyeWhite.querySelector('.pupil');
                                if (pupil) pupil.style.opacity = '1';
                            }
                        });
                    }
                });
            }

            if (passwordInput) {
                passwordInput.addEventListener('focus', () => setEyesClosed(true));
                passwordInput.addEventListener('blur', () => setEyesClosed(false));
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initAnimation();
        });

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                const theme = e.matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                updateThemeIcon(theme);
            }
        });
    </script>
</body>
</html>
