<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoMaster - 待办事项管理系统</title>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0D9488',
                        secondary: '#14B8A6',
                        cta: '#F97316',
                        background: '#F0FDFA',
                        text: '#134E4A'
                    },
                    fontFamily: {
                        jakarta: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Flat Design - 无阴影 */
        .card {
            border-radius: 0.5rem;
            border: 1px solid #E5E7EB;
        }

        /* Focus states for accessibility */
        .focus-ring:focus {
            outline: none;
            ring: 2px;
            ring-color: #0D9488;
            ring-offset: 2px;
        }

        /* Smooth transitions */
        .transition-smooth {
            transition: all 150ms ease;
        }

        /* Skip link for accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #0D9488;
            color: white;
            padding: 8px 16px;
            z-index: 100;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Loading skeleton */
        .skeleton {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .transition-smooth {
                transition: none;
            }
            .skeleton {
                animation: none;
            }
        }

        /* Tab indicator */
        .tab-active {
            color: #0D9488;
            border-bottom: 2px solid #0D9488;
        }

        /* Priority colors */
        .priority-high { color: #DC2626; }
        .priority-medium { color: #F59E0B; }
        .priority-low { color: #10B981; }

        /* Status badge */
        .status-completed {
            background-color: #D1FAE5;
            color: #065F46;
        }

        .status-pending {
            background-color: #FEF3C7;
            color: #92400E;
        }
    </style>
</head>
<body class="bg-background min-h-screen font-jakarta">
    <!-- Skip Link for Accessibility -->
    <a href="#main-content" class="skip-link">跳到主要内容</a>

    <!-- Navigation Bar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center space-x-3">
                    <svg class="w-8 h-8 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                    <span class="text-xl font-semibold text-text">TodoMaster</span>
                </div>

                <!-- Navigation Tabs -->
                <div class="flex space-x-1" role="tablist">
                    <button
                        id="tab-dashboard"
                        class="tab-btn px-4 py-2 text-sm font-medium transition-smooth cursor-pointer tab-active"
                        role="tab"
                        aria-selected="true"
                        onclick="switchTab('dashboard')"
                    >
                        仪表板
                    </button>
                    <button
                        id="tab-tasks"
                        class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 transition-smooth cursor-pointer"
                        role="tab"
                        aria-selected="false"
                        onclick="switchTab('tasks')"
                    >
                        任务列表
                    </button>
                    <button
                        id="tab-categories"
                        class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 transition-smooth cursor-pointer"
                        role="tab"
                        aria-selected="false"
                        onclick="switchTab('categories')"
                    >
                        分类管理
                    </button>
                    <button
                        id="tab-statistics"
                        class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 transition-smooth cursor-pointer"
                        role="tab"
                        aria-selected="false"
                        onclick="switchTab('statistics')"
                    >
                        统计分析
                    </button>
                </div>

                <!-- Quick Add Button -->
                <button
                    onclick="openAddTaskModal()"
                    class="px-4 py-2 bg-cta text-white text-sm font-medium rounded-lg transition-smooth hover:bg-orange-600 cursor-pointer focus-ring"
                    aria-label="快速添加任务"
                >
                    <span class="flex items-center space-x-2">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        <span>添加任务</span>
                    </span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="max-w-6xl mx-auto px-4 py-6">

        <!-- Dashboard View -->
        <section id="view-dashboard" class="view-section" role="tabpanel" aria-labelledby="tab-dashboard">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <!-- Total Tasks -->
                <div class="card bg-white p-6 transition-smooth hover:border-primary cursor-default">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">总任务数</p>
                            <p id="stat-total" class="text-2xl font-semibold text-text">-</p>
                        </div>
                        <svg class="w-8 h-8 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                        </svg>
                    </div>
                </div>

                <!-- Completed -->
                <div class="card bg-white p-6 transition-smooth hover:border-primary cursor-default">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">已完成</p>
                            <p id="stat-completed" class="text-2xl font-semibold text-primary">-</p>
                        </div>
                        <svg class="w-8 h-8 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                </div>

                <!-- Completion Rate -->
                <div class="card bg-white p-6 transition-smooth hover:border-primary cursor-default">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">完成率</p>
                            <p id="stat-rate" class="text-2xl font-semibold text-cta">-</p>
                        </div>
                        <svg class="w-8 h-8 text-cta" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                </div>

                <!-- Categories -->
                <div class="card bg-white p-6 transition-smooth hover:border-primary cursor-default">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">分类数</p>
                            <p id="stat-categories" class="text-2xl font-semibold text-text">-</p>
                        </div>
                        <svg class="w-8 h-8 text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Recent Tasks -->
            <div class="card bg-white p-6">
                <h2 class="text-lg font-semibold text-text mb-4">最近任务</h2>
                <div id="recent-tasks" class="space-y-3">
                    <!-- Tasks will be loaded here -->
                    <div class="skeleton h-12 bg-gray-100 rounded"></div>
                    <div class="skeleton h-12 bg-gray-100 rounded"></div>
                    <div class="skeleton h-12 bg-gray-100 rounded"></div>
                </div>
            </div>

            <!-- Quick Stats Chart -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                <div class="card bg-white p-6">
                    <h2 class="text-lg font-semibold text-text mb-4">优先级分布</h2>
                    <canvas id="chart-priority" height="200"></canvas>
                </div>
                <div class="card bg-white p-6">
                    <h2 class="text-lg font-semibold text-text mb-4">分类分布</h2>
                    <canvas id="chart-category" height="200"></canvas>
                </div>
            </div>
        </section>

        <!-- Tasks View -->
        <section id="view-tasks" class="view-section hidden" role="tabpanel" aria-labelledby="tab-tasks">
            <!-- Filters -->
            <div class="card bg-white p-4 mb-4">
                <div class="flex flex-wrap gap-4 items-center">
                    <!-- Search -->
                    <div class="flex-1 min-w-64">
                        <input
                            type="text"
                            id="search-input"
                            placeholder="搜索任务..."
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                            onkeyup="searchTasks()"
                        >
                    </div>

                    <!-- Category Filter -->
                    <select
                        id="filter-category"
                        class="px-4 py-2 border border-gray-200 rounded-lg transition-smooth cursor-pointer focus:border-primary focus:outline-none"
                        onchange="filterTasks()"
                    >
                        <option value="">所有分类</option>
                    </select>

                    <!-- Priority Filter -->
                    <select
                        id="filter-priority"
                        class="px-4 py-2 border border-gray-200 rounded-lg transition-smooth cursor-pointer focus:border-primary focus:outline-none"
                        onchange="filterTasks()"
                    >
                        <option value="">所有优先级</option>
                        <option value="2">高优先级</option>
                        <option value="1">中优先级</option>
                        <option value="0">低优先级</option>
                    </select>

                    <!-- Status Filter -->
                    <select
                        id="filter-status"
                        class="px-4 py-2 border border-gray-200 rounded-lg transition-smooth cursor-pointer focus:border-primary focus:outline-none"
                        onchange="filterTasks()"
                    >
                        <option value="">所有状态</option>
                        <option value="0">待完成</option>
                        <option value="1">已完成</option>
                    </select>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="card bg-white p-6">
                <div id="tasks-list" class="space-y-3">
                    <!-- Tasks will be loaded here -->
                    <div class="skeleton h-16 bg-gray-100 rounded"></div>
                    <div class="skeleton h-16 bg-gray-100 rounded"></div>
                    <div class="skeleton h-16 bg-gray-100 rounded"></div>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="flex justify-center mt-6 space-x-2">
                    <!-- Pagination buttons will be generated -->
                </div>
            </div>
        </section>

        <!-- Categories View -->
        <section id="view-categories" class="view-section hidden" role="tabpanel" aria-labelledby="tab-categories">
            <!-- Add Category Button -->
            <div class="mb-4">
                <button
                    onclick="openAddCategoryModal()"
                    class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg transition-smooth hover:bg-secondary cursor-pointer focus-ring"
                >
                    <span class="flex items-center space-x-2">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        <span>新建分类</span>
                    </span>
                </button>
            </div>

            <!-- Categories List -->
            <div class="card bg-white p-6">
                <div id="categories-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Categories will be loaded here -->
                    <div class="skeleton h-24 bg-gray-100 rounded"></div>
                    <div class="skeleton h-24 bg-gray-100 rounded"></div>
                    <div class="skeleton h-24 bg-gray-100 rounded"></div>
                </div>
            </div>
        </section>

        <!-- Statistics View -->
        <section id="view-statistics" class="view-section hidden" role="tabpanel" aria-labelledby="tab-statistics">
            <!-- Date Range Picker -->
            <div class="card bg-white p-4 mb-4">
                <div class="flex items-center space-x-4">
                    <label class="text-sm font-medium text-text">日期范围:</label>
                    <input
                        type="date"
                        id="date-start"
                        class="px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                    >
                    <input
                        type="date"
                        id="date-end"
                        class="px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                    >
                    <button
                        onclick="loadStatistics()"
                        class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg transition-smooth hover:bg-secondary cursor-pointer focus-ring"
                    >
                        查询
                    </button>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Trend Chart -->
                <div class="card bg-white p-6">
                    <h2 class="text-lg font-semibold text-text mb-4">任务趋势</h2>
                    <canvas id="chart-trend" height="300"></canvas>
                </div>

                <!-- Completion Time -->
                <div class="card bg-white p-6">
                    <h2 class="text-lg font-semibold text-text mb-4">完成时间统计</h2>
                    <div id="completion-time-stats" class="space-y-4">
                        <!-- Stats will be loaded here -->
                    </div>
                </div>

                <!-- Category Stats -->
                <div class="card bg-white p-6">
                    <h2 class="text-lg font-semibold text-text mb-4">分类统计</h2>
                    <canvas id="chart-category-stats" height="250"></canvas>
                </div>

                <!-- Priority Stats -->
                <div class="card bg-white p-6">
                    <h2 class="text-lg font-semibold text-text mb-4">优先级统计</h2>
                    <canvas id="chart-priority-stats" height="250"></canvas>
                </div>
            </div>
        </section>
    </main>

    <!-- Add Task Modal -->
    <div id="modal-add-task" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" role="dialog" aria-modal="true">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-text">添加任务</h2>
                <button onclick="closeModal('modal-add-task')" class="text-gray-400 hover:text-gray-600 cursor-pointer">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="form-add-task" onsubmit="submitAddTask(event)">
                <div class="space-y-4">
                    <!-- Title -->
                    <div>
                        <label for="task-title" class="block text-sm font-medium text-text mb-1">任务标题 *</label>
                        <input
                            type="text"
                            id="task-title"
                            name="title"
                            required
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                        >
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="task-description" class="block text-sm font-medium text-text mb-1">任务描述</label>
                        <textarea
                            id="task-description"
                            name="description"
                            rows="3"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none resize-none"
                        ></textarea>
                    </div>

                    <!-- Category -->
                    <div>
                        <label for="task-category" class="block text-sm font-medium text-text mb-1">分类</label>
                        <select
                            id="task-category"
                            name="categoryId"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth cursor-pointer focus:border-primary focus:outline-none"
                        >
                            <option value="">选择分类</option>
                        </select>
                    </div>

                    <!-- Priority -->
                    <div>
                        <label for="task-priority" class="block text-sm font-medium text-text mb-1">优先级</label>
                        <select
                            id="task-priority"
                            name="priority"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth cursor-pointer focus:border-primary focus:outline-none"
                        >
                            <option value="0">低</option>
                            <option value="1">中</option>
                            <option value="2">高</option>
                        </select>
                    </div>

                    <!-- Due Date -->
                    <div>
                        <label for="task-due-date" class="block text-sm font-medium text-text mb-1">截止日期</label>
                        <input
                            type="date"
                            id="task-due-date"
                            name="dueDate"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                        >
                    </div>

                    <!-- Submit Button -->
                    <div class="flex justify-end space-x-3 pt-4">
                        <button
                            type="button"
                            onclick="closeModal('modal-add-task')"
                            class="px-4 py-2 text-gray-600 text-sm font-medium transition-smooth hover:text-gray-800 cursor-pointer"
                        >
                            取消
                        </button>
                        <button
                            type="submit"
                            class="px-4 py-2 bg-cta text-white text-sm font-medium rounded-lg transition-smooth hover:bg-orange-600 cursor-pointer focus-ring"
                        >
                            创建任务
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="modal-add-category" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" role="dialog" aria-modal="true">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-text">新建分类</h2>
                <button onclick="closeModal('modal-add-category')" class="text-gray-400 hover:text-gray-600 cursor-pointer">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="form-add-category" onsubmit="submitAddCategory(event)">
                <div class="space-y-4">
                    <!-- Name -->
                    <div>
                        <label for="category-name" class="block text-sm font-medium text-text mb-1">分类名称 *</label>
                        <input
                            type="text"
                            id="category-name"
                            name="name"
                            required
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                        >
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="category-description" class="block text-sm font-medium text-text mb-1">分类描述</label>
                        <textarea
                            id="category-description"
                            name="description"
                            rows="3"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none resize-none"
                        ></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex justify-end space-x-3 pt-4">
                        <button
                            type="button"
                            onclick="closeModal('modal-add-category')"
                            class="px-4 py-2 text-gray-600 text-sm font-medium transition-smooth hover:text-gray-800 cursor-pointer"
                        >
                            取消
                        </button>
                        <button
                            type="submit"
                            class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg transition-smooth hover:bg-secondary cursor-pointer focus-ring"
                        >
                            创建分类
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="modal-edit-task" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" role="dialog" aria-modal="true">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-text">编辑任务</h2>
                <button onclick="closeModal('modal-edit-task')" class="text-gray-400 hover:text-gray-600 cursor-pointer">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="form-edit-task" onsubmit="submitEditTask(event)">
                <input type="hidden" id="edit-task-id" name="id">
                <div class="space-y-4">
                    <!-- Title -->
                    <div>
                        <label for="edit-task-title" class="block text-sm font-medium text-text mb-1">任务标题 *</label>
                        <input
                            type="text"
                            id="edit-task-title"
                            name="title"
                            required
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                        >
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="edit-task-description" class="block text-sm font-medium text-text mb-1">任务描述</label>
                        <textarea
                            id="edit-task-description"
                            name="description"
                            rows="3"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none resize-none"
                        ></textarea>
                    </div>

                    <!-- Category -->
                    <div>
                        <label for="edit-task-category" class="block text-sm font-medium text-text mb-1">分类</label>
                        <select
                            id="edit-task-category"
                            name="categoryId"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth cursor-pointer focus:border-primary focus:outline-none"
                        >
                            <option value="">选择分类</option>
                        </select>
                    </div>

                    <!-- Priority -->
                    <div>
                        <label for="edit-task-priority" class="block text-sm font-medium text-text mb-1">优先级</label>
                        <select
                            id="edit-task-priority"
                            name="priority"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth cursor-pointer focus:border-primary focus:outline-none"
                        >
                            <option value="0">低</option>
                            <option value="1">中</option>
                            <option value="2">高</option>
                        </select>
                    </div>

                    <!-- Due Date -->
                    <div>
                        <label for="edit-task-due-date" class="block text-sm font-medium text-text mb-1">截止日期</label>
                        <input
                            type="date"
                            id="edit-task-due-date"
                            name="dueDate"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg transition-smooth focus:border-primary focus:outline-none"
                        >
                    </div>

                    <!-- Submit Button -->
                    <div class="flex justify-end space-x-3 pt-4">
                        <button
                            type="button"
                            onclick="closeModal('modal-edit-task')"
                            class="px-4 py-2 text-gray-600 text-sm font-medium transition-smooth hover:text-gray-800 cursor-pointer"
                        >
                            取消
                        </button>
                        <button
                            type="submit"
                            class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg transition-smooth hover:bg-secondary cursor-pointer focus-ring"
                        >
                            保存修改
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>
</html>
