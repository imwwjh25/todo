<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoMaster - 待办事项管理系统</title>

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* ==================== CareerCompassAI Design System Variables ==================== */
        :root {
            /* Light Mode (默认) */
            --bg-primary: #FFFFFF;
            --bg-surface: #FFFFFF;
            --bg-surface-1: #FFFFFF;
            --bg-surface-2: #F9FAFB;
            --bg-nav: rgba(255,255,255,0.8);
            --bg-modal-overlay: rgba(0,0,0,0.5);
            --bg-input: #FFFFFF;

            --text-primary: #1F2937;
            --text-secondary: rgba(0,0,0,0.6);
            --text-muted: rgba(0,0,0,0.5);
            --text-link: #6366F1;

            --accent: #6366F1;
            --accent-hover: #4F46E5;
            --accent-hover-opacity: 0.88;

            --border: rgba(229,231,235,0.8);
            --border-input: rgba(229,231,235,0.8);
            --border-strong: #E5E7EB;
            --border-focus: var(--accent);

            --success: #34C759;
            --warning: #FF9500;
            --danger: #EF4444;

            /* CareerCompassAI 圆角系统 */
            --radius-sm: 9999px;    /* 输入框 - rounded-full */
            --radius-md: 24px;      /* 卡片 - rounded-3xl */
            --radius-lg: 24px;      /* 大区块 */
            --radius-button: 9999px; /* 按钮 - rounded-full */
            --radius-pill: 9999px;   /* 标签 - rounded-full */

            /* 阴影策略 */
            --shadow-card: none;
            --shadow-card-hover: 0 4px 12px rgba(99,102,241,0.1);
            --shadow-modal: 0 8px 32px rgba(0,0,0,0.12);
            --focus-ring: 0 0 0 3px rgba(99,102,241,0.2);

            /* 间距系统 */
            --space-section: 62px;
            --space-card: 12px;
            --space-content: 24px;

            /* 导航栏 */
            --nav-height: 56px;

            /* CareerCompassAI 字体系统 */
            --font-display: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-text: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-hero: 80px;
            --font-title: 48px;
            --font-section: 24px;
            --font-body: 17px;
            --font-nav: 12px;
            --font-small: 14px;

            /* 动效 */
            --transition-standard: cubic-bezier(0.4, 0, 0.6, 1);
            --transition-duration: 0.32s;
            --transition-hover: 0.3s ease;
        }

        /* Dark Mode - CareerCompassAI 风格 */
        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-surface: #1F2937;
            --bg-surface-1: #1F2937;
            --bg-surface-2: #374151;
            --bg-surface-3: #374151;
            --bg-nav: rgba(31,36,55,0.8);
            --bg-modal-overlay: rgba(0,0,0,0.7);
            --bg-input: #374151;

            --text-primary: #F9FAFB;
            --text-secondary: rgba(255,255,255,0.6);
            --text-muted: rgba(255,255,255,0.5);
            --text-link: #818CF8;

            --accent: #818CF8;
            --accent-hover: #A78BFA;

            --border: rgba(75,85,99,0.8);
            --border-input: rgba(75,85,99,0.8);
            --border-strong: #4B5563;
            --border-focus: var(--accent);

            --success: #34C759;
            --warning: #FF9500;
            --danger: #EF4444;

            --shadow-card: none;
            --shadow-card-hover: 0 4px 12px rgba(129,140,248,0.1);
            --shadow-modal: 0 8px 32px rgba(0,0,0,0.24);
            --focus-ring: 0 0 0 3px rgba(129,140,248,0.2);
        }

        /* ==================== Base Styles ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-text);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47;
            letter-spacing: -0.374px;
            min-height: 100vh;
            transition: background var(--transition-duration) var(--transition-standard), color var(--transition-duration) var(--transition-standard);
        }

        /* ==================== Navigation - CareerCompassAI 风格 ==================== */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: var(--nav-height);
            background: var(--bg-nav);
            backdrop-filter: saturate(180%) blur(12px);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition-duration) var(--transition-standard);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .nav-logo {
            width: 28px;
            height: 28px;
            color: var(--accent);
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            list-style: none;
        }

        .nav-tab {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tab:hover {
            color: var(--text-primary);
        }

        .nav-tab.active {
            color: white;
            background: var(--accent);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-surface-1);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.15s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            color: var(--text-primary);
        }

        /* ==================== Buttons - CareerCompassAI 风格 ==================== */
        .btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            font-family: var(--font-text);
            font-size: 15px;
            font-weight: 500;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-button);
            cursor: pointer;
            overflow: hidden;
            background: var(--bg-surface);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .btn:hover {
            border-color: var(--accent);
        }

        /* 按钮文字层 */
        .btn-text {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* 按钮hover背景层 */
        .btn-hover-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--accent);
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: var(--radius-button);
        }

        .btn-hover-bg svg {
            width: 16px;
            height: 16px;
        }

        /* Hover动画 */
        .btn:hover .btn-text {
            transform: translateX(40px);
            opacity: 0;
        }

        .btn:hover .btn-hover-bg {
            opacity: 1;
        }

        .btn-primary {
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-secondary:hover .btn-hover-bg {
            background: var(--accent);
        }

        .btn-ghost {
            background: var(--bg-surface-1);
            color: var(--text-primary);
            border-color: transparent;
        }

        .btn-ghost:hover {
            border-color: var(--accent);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-sm .btn-hover-bg svg {
            width: 14px;
            height: 14px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 50%;
            background: rgba(60,60,67,0.64);
            color: var(--text-muted);
            border: none;
        }

        .btn-icon:hover {
            color: var(--text-primary);
            background: var(--bg-surface-2);
        }

        .btn-icon:hover .btn-text {
            transform: none;
            opacity: 1;
        }

        /* 主要CTA按钮样式 */
        .btn-cta {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-cta:hover {
            border-color: var(--accent-hover);
        }

        .btn-cta .btn-hover-bg {
            background: var(--accent-hover);
        }

        /* ==================== Cards - CareerCompassAI 风格 ==================== */
        .card {
            background: var(--bg-surface-1);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            transition: box-shadow var(--transition-duration) var(--transition-standard);
        }

        [data-theme="dark"] .card {
            border: 1px solid var(--border);
        }

        .card-hover:hover {
            box-shadow: var(--shadow-card-hover);
            transform: scale(1.01);
        }

        .card-elevated {
            background: var(--bg-surface-3);
            box-shadow: none;
        }

        /* Stats Card */
        .stat-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            color: var(--accent);
        }

        /* ==================== Forms - CareerCompassAI 风格 ==================== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            height: 48px;
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: var(--radius-sm);  /* 9999px */
            font-family: var(--font-text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: var(--focus-ring);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
            border-radius: 24px;  /* textarea用大圆角 */
            padding: 14px 16px;
        }

        .form-select {
            cursor: pointer;
        }

        /* ==================== Task Item - CareerCompassAI 风格 ==================== */
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--bg-surface-1);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: none;
            transition: box-shadow var(--transition-duration) var(--transition-standard), transform var(--transition-duration) var(--transition-standard);
        }

        .task-item:hover {
            box-shadow: var(--shadow-card-hover);
            transform: scale(1.005);
        }

        .task-item.completed .task-title {
            opacity: 0.5;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border-input);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .task-checkbox:hover {
            border-color: var(--accent);
        }

        .task-checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .task-checkbox svg {
            width: 12px;
            height: 12px;
            color: #FFFFFF;
        }

        .task-content {
            flex: 1;
            padding-left: 16px;
        }

        .task-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .task-description {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .task-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 9999px;
        }

        .task-priority-high { background: rgba(239,68,68,0.12); color: var(--danger); }
        .task-priority-medium { background: rgba(255,149,0,0.12); color: var(--warning); }
        .task-priority-low { background: rgba(99,102,241,0.12); color: var(--accent); }

        .task-category {
            background: var(--bg-surface-2);
            color: var(--text-secondary);
        }

        .task-due {
            font-size: 12px;
            color: var(--text-muted);
        }

        .task-status {
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 9999px;
        }

        .task-status-completed { background: rgba(52,199,89,0.12); color: var(--success); }
        .task-status-pending { background: rgba(255,149,0,0.12); color: var(--warning); }

        .task-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-action-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.15s;
        }

        .task-action-btn:hover {
            color: var(--text-primary);
            background: var(--bg-surface-2);
        }

        .task-action-btn.delete:hover {
            color: var(--danger);
        }

        /* Compact Task */
        .task-compact {
            padding: 12px 16px;
        }

        .task-compact .task-checkbox {
            width: 20px;
            height: 20px;
        }

        .task-compact .task-title {
            font-size: 15px;
        }

        /* ==================== Modal - CareerCompassAI 风格 ==================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-modal-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 480px;
            margin: 20px;
            box-shadow: var(--shadow-modal);
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.15s;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: var(--bg-surface-2);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
        }

        /* ==================== Pagination - CareerCompassAI 风格 ==================== */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .page-btn {
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-surface-1);
            border: 1px solid var(--border);
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--bg-surface-2);
            border-color: var(--accent);
        }

        .page-btn.active {
            background: var(--accent);
            color: #FFFFFF;
            border-color: var(--accent);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== Section Styles - CareerCompassAI 风格 ==================== */
        .section-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        /* ==================== Filter Bar - CareerCompassAI 风格 ==================== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-surface-1);
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .filter-search {
            flex: 1;
            min-width: 200px;
        }

        .filter-select {
            min-width: 120px;
        }

        /* ==================== Category Card - CareerCompassAI 风格 ==================== */
        .category-card {
            padding: 20px;
            background: var(--bg-surface-1);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: none;
            transition: box-shadow var(--transition-duration) var(--transition-standard), transform var(--transition-duration) var(--transition-standard);
        }

        .category-card:hover {
            box-shadow: var(--shadow-card-hover);
            transform: scale(1.01);
        }

        .category-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
        }

        /* ==================== Statistics Styles - CareerCompassAI 风格 ==================== */
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-surface-1);
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .stat-item-label {
            font-size: 14px;
            color: var(--text-muted);
        }

        .stat-item-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ==================== Skeleton Loading - Apple Store 风格 ==================== */
        .skeleton {
            background: var(--bg-surface-2);
            border-radius: var(--radius-sm);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ==================== Chart Container - CareerCompassAI 风格 ==================== */
        .chart-container {
            background: var(--bg-surface-1);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        /* ==================== Empty State ==================== */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* ==================== Skip Link ==================== */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--accent);
            color: #ffffff;
            padding: 8px 16px;
            z-index: 300;
            border-radius: var(--radius-sm);
        }

        .skip-link:focus {
            top: 8px;
        }

        /* ==================== Responsive - Apple Store 风格 ==================== */
        @media (max-width: 768px) {
            .nav {
                padding: 0 20px;
            }

            .nav-tabs {
                display: none;
            }

            .main-content {
                padding: 16px 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .filter-bar {
                flex-wrap: wrap;
            }

            .filter-search {
                min-width: 100%;
                order: -1;
            }

            .modal-content {
                margin: 16px;
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .categories-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ==================== Reduced Motion ==================== */
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- Skip Link for Accessibility -->
    <a href="#main-content" class="skip-link">跳到主要内容</a>

    <!-- Navigation Bar -->
    <nav class="nav">
        <div class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span>TodoMaster</span>
        </div>

        <ul class="nav-tabs" role="tablist">
            <li>
                <button id="tab-dashboard" class="nav-tab active" role="tab" aria-selected="true" onclick="switchTab('dashboard')">
                    仪表板
                </button>
            </li>
            <li>
                <button id="tab-tasks" class="nav-tab" role="tab" aria-selected="false" onclick="switchTab('tasks')">
                    任务列表
                </button>
            </li>
            <li>
                <button id="tab-categories" class="nav-tab" role="tab" aria-selected="false" onclick="switchTab('categories')">
                    分类管理
                </button>
            </li>
            <li>
                <button id="tab-statistics" class="nav-tab" role="tab" aria-selected="false" onclick="switchTab('statistics')">
                    统计分析
                </button>
            </li>
        </ul>

        <div class="nav-actions">
            <span id="user-nickname" class="nav-user" style="font-size:14px; color:var(--text-secondary); margin-right:8px"></span>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
                <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <svg id="theme-icon-moon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
            </button>
            <button id="logout-btn" class="btn btn-ghost btn-sm" onclick="handleLogout()" aria-label="退出登录">
                <span class="btn-text">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    退出
                </span>
                <div class="btn-hover-bg">
                    <span>退出</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </div>
            </button>
            <button class="btn btn-primary btn-sm" onclick="openAddTaskModal()" aria-label="快速添加任务">
                <span class="btn-text">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    添加任务
                </span>
                <div class="btn-hover-bg">
                    <span>添加任务</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14"/>
                        <path d="m12 5 7 7-7 7"/>
                    </svg>
                </div>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content" style="max-width:980px; margin:0 auto; padding:48px">

        <!-- Dashboard View -->
        <section id="view-dashboard" class="view-section" role="tabpanel" aria-labelledby="tab-dashboard">
            <!-- Stats Cards -->
            <div class="stats-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:48px">
                <div class="card stat-card card-hover">
                    <div>
                        <p class="stat-label">总任务数</p>
                        <p id="stat-total" class="stat-value">-</p>
                    </div>
                    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                    </svg>
                </div>

                <div class="card stat-card card-hover">
                    <div>
                        <p class="stat-label">已完成</p>
                        <p id="stat-completed" class="stat-value" style="color:var(--success)">-</p>
                    </div>
                    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>

                <div class="card stat-card card-hover">
                    <div>
                        <p class="stat-label">完成率</p>
                        <p id="stat-rate" class="stat-value" style="color:var(--accent)">-</p>
                    </div>
                    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>

                <div class="card stat-card card-hover">
                    <div>
                        <p class="stat-label">分类数</p>
                        <p id="stat-categories" class="stat-value">-</p>
                    </div>
                    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
                    </svg>
                </div>
            </div>

            <!-- Recent Tasks -->
            <div class="chart-container" style="margin-bottom:48px">
                <h2 class="chart-title">最近任务</h2>
                <div id="recent-tasks" style="display:flex; flex-direction:column; gap:12px">
                    <div class="skeleton" style="height:48px"></div>
                    <div class="skeleton" style="height:48px"></div>
                    <div class="skeleton" style="height:48px"></div>
                </div>
            </div>

            <!-- Charts -->
            <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:16px">
                <div class="chart-container">
                    <h2 class="chart-title">优先级分布</h2>
                    <div style="height:200px">
                        <canvas id="chart-priority"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <h2 class="chart-title">分类分布</h2>
                    <div style="height:200px">
                        <canvas id="chart-category"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tasks View -->
        <section id="view-tasks" class="view-section hidden" role="tabpanel" aria-labelledby="tab-tasks">
            <!-- Filters -->
            <div class="filter-bar">
                <div class="filter-search">
                    <input type="text" id="search-input" class="form-input" placeholder="搜索任务..." onkeyup="searchTasks()">
                </div>
                <select id="filter-category" class="form-select filter-select" onchange="filterTasks()">
                    <option value="">所有分类</option>
                </select>
                <select id="filter-priority" class="form-select filter-select" onchange="filterTasks()">
                    <option value="">所有优先级</option>
                    <option value="2">高优先级</option>
                    <option value="1">中优先级</option>
                    <option value="0">低优先级</option>
                </select>
                <select id="filter-status" class="form-select filter-select" onchange="filterTasks()">
                    <option value="">所有状态</option>
                    <option value="0">待完成</option>
                    <option value="1">已完成</option>
                </select>
            </div>

            <!-- Tasks List -->
            <div class="chart-container">
                <div id="tasks-list" style="display:flex; flex-direction:column; gap:12px">
                    <div class="skeleton" style="height:64px"></div>
                    <div class="skeleton" style="height:64px"></div>
                    <div class="skeleton" style="height:64px"></div>
                </div>
                <div id="pagination" class="pagination"></div>
            </div>
        </section>

        <!-- Categories View -->
        <section id="view-categories" class="view-section hidden" role="tabpanel" aria-labelledby="tab-categories">
            <div style="margin-bottom:16px">
                <button class="btn btn-secondary btn-sm" onclick="openAddCategoryModal()">
                    <span class="btn-text">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        新建分类
                    </span>
                    <div class="btn-hover-bg">
                        <span>新建分类</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14"/>
                            <path d="m12 5 7 7-7 7"/>
                        </svg>
                    </div>
                </button>
            </div>

            <div id="categories-list" class="categories-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px">
                <div class="skeleton" style="height:96px"></div>
                <div class="skeleton" style="height:96px"></div>
                <div class="skeleton" style="height:96px"></div>
            </div>
        </section>

        <!-- Statistics View -->
        <section id="view-statistics" class="view-section hidden" role="tabpanel" aria-labelledby="tab-statistics">
            <div class="filter-bar">
                <label style="font-size:14px; font-weight:500; color:var(--text-primary)">日期范围:</label>
                <input type="date" id="date-start" class="form-input" style="max-width:160px">
                <input type="date" id="date-end" class="form-input" style="max-width:160px">
                <button class="btn btn-primary btn-sm" onclick="loadStatistics()">
                    <span class="btn-text">查询</span>
                    <div class="btn-hover-bg">
                        <span>查询</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14"/>
                            <path d="m12 5 7 7-7 7"/>
                        </svg>
                    </div>
                </button>
            </div>

            <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:16px">
                <div class="chart-container">
                    <h2 class="chart-title">任务趋势</h2>
                    <div style="height:300px">
                        <canvas id="chart-trend"></canvas>
                    </div>
                </div>

                <div class="chart-container">
                    <h2 class="chart-title">完成时间统计</h2>
                    <div id="completion-time-stats" style="display:flex; flex-direction:column; gap:12px">
                    </div>
                </div>

                <div class="chart-container">
                    <h2 class="chart-title">分类统计</h2>
                    <div style="height:250px">
                        <canvas id="chart-category-stats"></canvas>
                    </div>
                </div>

                <div class="chart-container">
                    <h2 class="chart-title">优先级统计</h2>
                    <div style="height:250px">
                        <canvas id="chart-priority-stats"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Add Task Modal -->
    <div id="modal-add-task" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加任务</h2>
                <button class="modal-close" onclick="closeModal('modal-add-task')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="form-add-task" onsubmit="submitAddTask(event)">
                <div class="form-group">
                    <label for="task-title" class="form-label">任务标题 *</label>
                    <input type="text" id="task-title" name="title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="task-description" class="form-label">任务描述</label>
                    <textarea id="task-description" name="description" class="form-textarea" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="task-category" class="form-label">分类</label>
                    <select id="task-category" name="categoryId" class="form-select">
                        <option value="">选择分类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-priority" class="form-label">优先级</label>
                    <select id="task-priority" name="priority" class="form-select">
                        <option value="0">低</option>
                        <option value="1">中</option>
                        <option value="2">高</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-due-date" class="form-label">截止日期</label>
                    <input type="date" id="task-due-date" name="dueDate" class="form-input">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeModal('modal-add-task')">
                        <span class="btn-text">取消</span>
                    </button>
                    <button type="submit" class="btn btn-primary btn-sm">
                        <span class="btn-text">创建任务</span>
                        <div class="btn-hover-bg">
                            <span>创建任务</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14"/>
                                <path d="m12 5 7 7-7 7"/>
                            </svg>
                        </div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="modal-add-category" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">新建分类</h2>
                <button class="modal-close" onclick="closeModal('modal-add-category')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="form-add-category" onsubmit="submitAddCategory(event)">
                <div class="form-group">
                    <label for="category-name" class="form-label">分类名称 *</label>
                    <input type="text" id="category-name" name="name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="category-description" class="form-label">分类描述</label>
                    <textarea id="category-description" name="description" class="form-textarea" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeModal('modal-add-category')">
                        <span class="btn-text">取消</span>
                    </button>
                    <button type="submit" class="btn btn-primary btn-sm">
                        <span class="btn-text">创建分类</span>
                        <div class="btn-hover-bg">
                            <span>创建分类</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14"/>
                                <path d="m12 5 7 7-7 7"/>
                            </svg>
                        </div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="modal-edit-task" class="modal-overlay" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">编辑任务</h2>
                <button class="modal-close" onclick="closeModal('modal-edit-task')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="form-edit-task" onsubmit="submitEditTask(event)">
                <input type="hidden" id="edit-task-id" name="id">
                <div class="form-group">
                    <label for="edit-task-title" class="form-label">任务标题 *</label>
                    <input type="text" id="edit-task-title" name="title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="edit-task-description" class="form-label">任务描述</label>
                    <textarea id="edit-task-description" name="description" class="form-textarea" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-task-category" class="form-label">分类</label>
                    <select id="edit-task-category" name="categoryId" class="form-select">
                        <option value="">选择分类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-task-priority" class="form-label">优先级</label>
                    <select id="edit-task-priority" name="priority" class="form-select">
                        <option value="0">低</option>
                        <option value="1">中</option>
                        <option value="2">高</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-task-due-date" class="form-label">截止日期</label>
                    <input type="date" id="edit-task-due-date" name="dueDate" class="form-input">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeModal('modal-edit-task')">
                        <span class="btn-text">取消</span>
                    </button>
                    <button type="submit" class="btn btn-primary btn-sm">
                        <span class="btn-text">保存修改</span>
                        <div class="btn-hover-bg">
                            <span>保存修改</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14"/>
                                <path d="m12 5 7 7-7 7"/>
                            </svg>
                        </div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>
</html>
